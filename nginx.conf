server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Fix #6: Brotli + Gzip compression ──────────────────────────────
    # Serve pre-compressed .br files generated by vite-plugin-compression
    brotli_static on;
    gzip_static   on;

    # Runtime gzip fallback (for assets without pre-compressed variants)
    gzip              on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Fix #6: Aggressive cache headers for hashed static assets ────────
    # Vite appends content-hash to JS/CSS filenames — safe to cache 1 year
    location ~* \.(js|css|woff2|woff|ttf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
    }

    # Images — 30 days (may change without hash)
    location ~* \.(webp|png|jpg|jpeg|ico|gif|svg|avif)$ {
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
    }

    # Videos — 7 days (large files, less likely to change)
    location ~* \.(mp4|webm)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # ── SPA fallback — all other routes serve index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # Do NOT cache index.html — it must always be fresh
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
