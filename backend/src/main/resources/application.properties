paytm.payment.vsms.details.CHANNEL_ID: WEB
paytm.payment.vsms.details.INDUSTRY_TYPE_ID: Education
paytm.payment.vsms.details.WEBSITE: WEBSTAGING
paytm.payment.vsms.details.CALLBACK_URL: ${PAYTM_PAYMENT_CALLBACK_URL}

paytm.initiate.transaction.url:${PAYTM_INITIATE_TRANSACTION_URL}
paytm.order.status.url:${PAYTM_ORDER_STATUS_URL}

## VideoCipher Properties
