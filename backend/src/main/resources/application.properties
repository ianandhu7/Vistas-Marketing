## Server Properties
server.port= 9090
server.compression.enabled=true

## Spring DATASOURCE (DataSourceAutoConfiguration & DataSourceProperties)
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}

## Hibernate Properties
## The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL}
spring.data.jpa.repositories.bootstrap-mode=default

## Hibernate Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.cache=TRACE


spring.profiles.active=@profileActive@

## Initialize the datasource with available DDL and DML scripts
spring.datasource.initialization-mode=always
spring.datasource.data=classpath:data.sql

## Jackson Properties
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=IST

## App Properties
app.jwt.name=${JWT_NAME}
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationInMs=${JWT_EXPIRATION_INMS}
app.mobile.jwtExpirationInMs=${JWT_MOB_EXPIRATION_INMS}
app.jwt.refresh=${JWT_REFRESH_INMS}
app.lockDuration=${LOCK_DURATION}


## Sending Email properties
spring.mail.host=email.ap-south-1.amazonaws.com
spring.mail.username=${SES_MAIL_USERNAME}
spring.mail.password=${SES_MAIL_PASSWORD}
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.port=25
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

logging.level.org.springframework.boot.autoconfigure=INFO

spring.banner.location=classpath:vlearning-banner.txt

## Payment Response URL UI Page
payment.url.website=${WEBAPP_PAYMENT_URL}

## Paytm Payment Details Static
paytm.payment.vsms.merchant.id: ${MERCHANT_ID}
paytm.payment.vsms.channelId: WEB
paytm.payment.vsms.website: WEBSTAGING
paytm.payment.vsms.industryTypeId: Education
