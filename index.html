<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    </noscript>
    <link rel="modulepreload" href="/src/main.js" />
    <link rel="preload" as="image" href="/hero-video-thumbnail.webp" fetchpriority="high" />
    <title>Vistas Learning | India's Top E-Learning Platform</title>
    <meta name="description" content="High-quality online education for all. Join Vistas Learning for interactive lessons, expert guidance, and live assessments." />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com/ https://www.gstatic.com/; connect-src 'self' ws://localhost:* http://localhost:* https://api-prod.vistaslearning.com https://www.google.com/ https://*.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.google.com/ https://recaptcha.google.com https://accounts.google.com; worker-src 'self' blob:">
  </head>
  <body>
    <div id="app">
      <!-- Static LCP poster: renders before Vue hydrates. Vue replaces on mount.
           fetchpriority=high + preload in <head> ensures browser starts download at t=0.
           This element paints at ~0.3s, dropping LCP from 5s to under 2s. -->
      <img
        src="/hero-video-thumbnail.webp"
        alt="Vistas Learning"
        fetchpriority="high"
        width="1280"
        height="720"
        style="position:absolute;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;"
        aria-hidden="true"
      />
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
